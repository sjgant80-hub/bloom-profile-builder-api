services:
  bloom-profile-builder-api:
    build: .
    image: ai-native-solutions/bloom-profile-builder-api:1.0.0
    container_name: bloom-profile-builder-api
    restart: unless-stopped
    ports:
      - "4210:4210"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4210
